<div class="container-fluid py-5 bg-light">

  <div class="row justify-content-center">

    <div class="col-12 col-xl-8">

      <div class="mb-4">
        <h2 class="display-6 fw-bold mb-1">Registrar Propietario</h2>
        <p class="text-secondary mb-0">
          Ingrese los datos del propietario de la mascota
        </p>
      </div>

      <div class="form-card">

        <form (ngSubmit)="guardar()" #formPropietario="ngForm">

          <div class="row g-4">

            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombre</label>
              <input
                type="text"
                class="form-control form-control-lg"
                name="nombre"
                [(ngModel)]="propietario.nombre"
                required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Teléfono</label>
              <input
                type="text"
                class="form-control form-control-lg"
                name="telefono"
                [(ngModel)]="propietario.telefono"
                required>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Email</label>
              <input
                type="email"
                class="form-control form-control-lg"
                name="email"
                [(ngModel)]="propietario.email"
                required>
            </div>

          </div>

          <div class="d-flex justify-content-end gap-3 mt-5">

            <a routerLink="/propietarios"
               class="btn btn-outline-secondary btn-lg px-4">
               Cancelar
            </a>

            <button
              class="btn btn-primary btn-lg px-5"
              type="submit">
              Guardar
            </button>

          </div>

        </form>

      </div>

    </div>

  </div>

</div>
